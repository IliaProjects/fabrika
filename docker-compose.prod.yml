services:
  authservice.api:
    build:
      context: ./fabrika_back
      dockerfile: AuthService.Api/Dockerfile
    container_name: fabrika-auth-prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5001:8080"

  bff.api:
    build:
      context: ./fabrika_back
      dockerfile: Bff.Api/Dockerfile
    container_name: fabrika-bff-prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5002:8080"

  fabrika.front:
    build:
      context: ./fabrika_front
      dockerfile: Dockerfile
    container_name: fabrika-front-prod
    ports:
      - "3000:80"
    depends_on:
      - authservice.api
      - bff.api
